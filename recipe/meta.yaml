{% set name = "czmodel" %}
{% set version = "6.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/czmodel-{{ version }}.tar.gz
  sha256: 186ff3349ab91503a9f922fb66f753a373603af4226504da53c0aeaa5f91bfa8

build:
  entry_points:
    - savedmodel2czann=czmodel.core.convert:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.6,<3.10
  run:
    - defusedxml
    - numpy
    - onnx
    - python >=3.6,<3.10
    - pytorch
    - tensorflow >=2,<3,!=2.1
    - tf2onnx
    - xmltodict

test:
  imports:
    - czmodel
  commands:
    - pip list
    # - pip check
    - savedmodel2czann
  requires:
    - pip

about:
  home: https://pypi.org/project/czmodel
  summary: A conversion tool for TensorFlow or ONNX ANNs to CZANN
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - goanpeca
